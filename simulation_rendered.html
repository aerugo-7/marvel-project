    <link rel="stylesheet" href="shield_styles.css">
    
    <style>
        :root { --shield-cyan: #00f2ff; --shield-blue: #0066ff; --shield-danger: #ff4b4b; --shield-bg: #050a10; }
        body, html { margin: 0; padding: 0; background-color: var(--shield-bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; height: 100vh; }
        
        .main-wrapper { min-height: 100vh; width: 100vw; display: flex; flex-direction: column; background: linear-gradient(rgba(5, 10, 16, 0.85), rgba(5, 10, 16, 0.85)), url('./pic/main_bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        #canvas-lightning { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }
        
        /* 扫描线效果，和绝密档案完全一致 */
        .scanline-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; overflow: hidden; }
        .scanline-overlay::before { content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 50%; background: linear-gradient(to bottom, transparent, rgba(0, 242, 255, 0.03), transparent); animation: scanLine 8s linear infinite; }
        @keyframes scanLine { 0% { top: -50%; } 100% { top: 150%; } }

        /* 导航栏，和绝密档案完全一致 */
        .navbar { height: 65px; background: rgba(5, 15, 30, 0.95); border-bottom: 2px solid var(--shield-blue); display: flex; align-items: center; padding: 0 50px; flex-shrink: 0; z-index: 1000; position: relative; }
        .navbar::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent 0%, var(--shield-cyan) 20%, var(--shield-cyan) 80%, transparent 100%); opacity: 0.6; }
        .nav-brand { font-weight: bold; letter-spacing: 2px; color: var(--shield-cyan); display: flex; align-items: center; text-shadow: 0 0 10px rgba(0, 242, 255, 0.6); }
        .nav-links { margin-left: auto; display: flex; gap: 25px; }
        .nav-item { color: #aaa; text-decoration: none; padding: 10px 15px; font-size: 14px; transition: 0.3s; position: relative; overflow: hidden; }
        .nav-item:hover { color: var(--shield-cyan); }
        .nav-active { border-bottom: 2px solid var(--shield-cyan); color: var(--shield-cyan) !important; background: rgba(0, 242, 255, 0.1); }

        .content { flex-grow: 1; padding: 40px; box-sizing: border-box; }
        
        /* 玻璃面板，和绝密档案完全一致 */
        .glass-panel { background: rgba(10, 25, 47, 0.85); border: 1px solid var(--shield-blue); border-left: 5px solid var(--shield-cyan); border-radius: 4px; padding: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); position: relative; overflow: hidden; transition: all 0.3s; }
        .glass-panel:hover { box-shadow: 0 15px 40px rgba(0, 242, 255, 0.15); }
        .glass-panel::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0, 242, 255, 0.05), transparent); transition: left 0.5s; }
        .glass-panel:hover::before { left: 100%; }
        
        /* 模块介绍卡片，和绝密档案完全一致 */
        .intro-panel { background: linear-gradient(135deg, rgba(0, 242, 255, 0.1) 0%, rgba(0, 20, 40, 0.3) 100%); border-left-width: 8px; padding: 30px; animation: fadeInUp 0.6s ease-out; }
        .intro-panel h1 { color: var(--shield-cyan); margin: 0 0 10px 0; font-size: 2rem; text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); animation: pulseGlow 3s ease-in-out infinite; display: inline-block; }
        
        /* 游戏卡片容器：网格布局，彻底解决大小混乱 */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        /* 游戏卡片样式：和全站风格统一，hover显示二维码 */
        .game-card {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--shield-cyan);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            height: 450px;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.5);
            border-color: var(--shield-cyan);
        }

        /* 游戏封面：固定大小，居中显示 */
        .game-cover {
             width: 100%;
             height: 100%;
             object-fit: cover;
             transition: opacity 0.3s ease;
        }

        /* 二维码遮罩层：hover淡入，风格统一 */
        .qrcode-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 10, 16, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-card:hover .qrcode-overlay {
            opacity: 1;
        }

        .qrcode-img {
            width: 220px;
            height: 220px;
            background-color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid var(--shield-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .qrcode-tip {
            color: var(--shield-cyan);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .game-title {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            transition: opacity 0.3s ease;
        }

        .game-card:hover .game-title {
            opacity: 0;
        }

        /* 动画效果，和绝密档案完全一致 */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0%, 100% { text-shadow: 0 0 20px rgba(0, 242, 255, 0.5); } 50% { text-shadow: 0 0 40px rgba(0, 242, 255, 0.8), 0 0 60px rgba(0, 242, 255, 0.4); } }
        
        @media (max-width: 768px) {
            .game-grid { grid-template-columns: 1fr; }
            .navbar { padding: 0 20px; }
            .nav-links { gap: 10px; }
            .nav-item { padding: 8px 10px; font-size: 12px; }
        }
    </style>
</head>

    <!-- 闪电特效代码：和绝密档案完全一致，保持风格统一 -->
    <script>
        const canvas = document.getElementById('canvas-lightning');
        const ctx = canvas.getContext('2d');
        let width, height;
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let mouse = { x: -1000, y: -1000 };
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; for(let i=0; i<2; i++) { particles.push(new Particle(e.clientX, e.clientY)); } });
        let particles =[];
        class Particle {
            constructor(x, y) { this.x = x; this.y = y; this.size = Math.random() * 1.5 + 0.5; this.speedX = Math.random() * 2 - 1; this.speedY = Math.random() * 2 - 1; this.color = '#00f2ff'; this.life = 60; }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= 2; }
            draw() { ctx.strokeStyle = this.color; ctx.lineWidth = this.size; ctx.shadowBlur = 5; ctx.shadowColor = this.color; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + Math.random()*8-4, this.y + Math.random()*8-4); ctx.stroke(); }
        }
        function animate() { ctx.clearRect(0, 0, width, height); for(let i=0; i<particles.length; i++) { particles[i].update(); particles[i].draw(); if(particles[i].life <= 0) { particles.splice(i, 1); i--; } } requestAnimationFrame(animate); }
        animate();

        // 点击卡片跳转到易企秀H5（电脑端直接打开）
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => {
                const link = card.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                if (link) window.open(link, '_blank');
            });
        });
    </script>
