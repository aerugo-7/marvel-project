<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>神盾局：超人类绝密档案</title>
    <!-- 引入绘图核心库 -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <style>
        :root { --shield-cyan: #00f2ff; --shield-blue: #0066ff; --shield-danger: #ff4b4b; --shield-bg: #050a10; }
        body, html { margin: 0; padding: 0; background-color: var(--shield-bg); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; height: 100vh; }
        
        .main-wrapper { min-height: 100vh; width: 100vw; display: flex; flex-direction: column; background: linear-gradient(rgba(5, 10, 16, 0.85), rgba(5, 10, 16, 0.85)), url('./pic/main_bg.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        #canvas-lightning { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }
        
        .navbar { height: 65px; background: rgba(5, 15, 30, 0.95); border-bottom: 2px solid var(--shield-blue); display: flex; align-items: center; padding: 0 50px; flex-shrink: 0; z-index: 1000; }
        .nav-brand { font-weight: bold; letter-spacing: 2px; color: var(--shield-cyan); display: flex; align-items: center; }
        .nav-links { margin-left: auto; display: flex; gap: 25px; }
        .nav-item { color: #aaa; text-decoration: none; padding: 10px 15px; font-size: 14px; transition: 0.3s; }
        .nav-item:hover { color: var(--shield-cyan); }
        .nav-active { border-bottom: 2px solid var(--shield-cyan); color: var(--shield-cyan) !important; background: rgba(0, 242, 255, 0.1); }

        .content { flex-grow: 1; padding: 40px; box-sizing: border-box; }
        .glass-panel { background: rgba(13, 25, 48, 0.85); border: 1px solid var(--shield-blue); border-left: 5px solid var(--shield-cyan); border-radius: 4px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 档案页特有样式 */
        .search-box { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; color: #000; background: #fff; border: 2px solid var(--shield-cyan); border-radius: 5px; outline: none; margin-bottom: 20px; }
        .dossier-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
        .hero-img { width: 100%; height: 300px; object-fit: cover; border: 2px solid var(--shield-cyan); box-shadow: 0 0 15px var(--shield-cyan); border-radius: 8px; margin-bottom: 15px; }
        .data-row { margin: 8px 0; font-size: 1.1rem; border-bottom: 1px solid rgba(0,242,255,0.1); padding-bottom: 5px; }
        .data-label { color: var(--shield-cyan); font-weight: bold; width: 120px; display: inline-block; }
        
        #network-graph { width: 100%; height: 500px; border: 1px dashed var(--shield-blue); background: #050a10; }
    </style>
</head>
<body class="notranslate">
    <canvas id="canvas-lightning"></canvas>

    <div class="main-wrapper">
        <nav class="navbar">
            <div class="nav-brand"><img src="./pic/shield_logo.webp" width="50" style="margin-right:10px;"> SHIELD_STRATEGIC_COMMAND</div>
            <div class="nav-links">
                <a href="dashboard_rendered.html" class="nav-item">势力格局</a>
                <a href="dossier_rendered.html" class="nav-item nav-active">绝密档案</a>
                <a href="sim_rendered.html" class="nav-item">生存演习</a>
                <a href="game_rendered.html" class="nav-item">回响计划</a>
            </div>
        </nav>

        <div class="content">
            <h1>🔍 超人类绝密档案库</h1>
            
            <div class="glass-panel" style="background: rgba(0,242,255,0.1); border-left-color: var(--shield-cyan);">
                <b>📑 档案查阅指南：</b><br>
                <b>⚠️ 风险评估</b>：量化该英雄失踪或失控后对全宇宙社交秩序的冲击力。<b>📊 五维雷达</b>：名望代表广度，外交代表跨界联络力，忠诚代表圈内人占比。
            </div>

            <!-- 搜索下拉框 -->
            <select class="search-box" id="heroSelector" onchange="loadHeroData()">
                {{ hero_options_html }}
            </select>

            <div class="dossier-grid">
                <!-- 左侧：基础档案与雷达图 -->
                <div class="glass-panel">
                    <img id="h-img" src="./pic/shield_logo.webp" class="hero-img" onerror="this.src='./pic/shield_logo.webp'; this.style.objectFit='contain';">
                    <h2 id="h-name" style="color: var(--shield-cyan); margin-top: 0;">载入中...</h2>
                    <div class="data-row"><span class="data-label">🌍 所属阵营:</span> <span id="h-team">--</span></div>
                    <div class="data-row"><span class="data-label">⚠️ 风险评估:</span> <span id="h-risk" style="color: var(--shield-danger); font-weight: bold;">--/10</span></div>
                    <div class="data-row"><span class="data-label">🚻 性别/类型:</span> <span id="h-gender-type">--</span></div>
                    <div class="data-row"><span class="data-label">🎬 MCU记录:</span> <span id="h-mcu">--</span></div>
                    <div class="data-row"><span class="data-label">🎓 导师/领路人:</span> <span id="h-mentor">--</span></div>
                    <div class="data-row"><span class="data-label">🔥 核心能力:</span> <span id="h-power" style="font-size: 0.95rem;">--</span></div>
                    
                    <h3 style="margin-top: 25px; border-bottom: 1px solid var(--shield-cyan);">📊 综合战术评估</h3>
                    <div id="radar-chart" style="height: 300px;"></div>
                </div>

                <!-- 右侧：动态关系网 -->
                <div class="glass-panel">
                    <h3>🕸️ 实时社交圈探测 (核心 20人)</h3>
                    <div id="network-graph"></div>
                    <p style="margin-top:15px; color:#aaa;" id="h-style">社交风格：--</p>
                </div>
            </div>
        </div>
    </div>

<!-- 1. 数据岛技术：彻底解决 Trae 报错红线 -->
    <script id="hero-json-data" type="application/json">
        {{ hero_json_data }}
    </script>

    <script>
        // 2. 安全读取 Python 注入的数据
        let shieldData = {};
        try {
            const jsonText = document.getElementById('hero-json-data').textContent;
            shieldData = JSON.parse(jsonText);
        } catch (e) {
            console.warn("等待 Python 注入数据...");
        }
        
        let network = null;

        // --- 核心功能：刷新英雄数据 ---
        function loadHeroData() {
            const heroName = document.getElementById('heroSelector').value;
            const data = shieldData[heroName];
            if(!data) return;

            // 更新文本
            document.getElementById('h-name').innerText = heroName;
            document.getElementById('h-team').innerText = data.team;
            document.getElementById('h-risk').innerText = data.risk + '/10';
            document.getElementById('h-gender-type').innerText = data.gender + ' | ' + data.power_type;
            document.getElementById('h-mcu').innerText = data.mcu;
            document.getElementById('h-mentor').innerText = data.mentor;
            document.getElementById('h-power').innerText = data.detail_power;
            document.getElementById('h-style').innerText = "社交特质: " + data.social_style;
            
            // 更新图片
            const imgEl = document.getElementById('h-img');
            imgEl.style.objectFit = 'cover';
            imgEl.src = data.img_url;

            // 绘制 Plotly 雷达图
            const radarData =[{
                type: 'scatterpolar',
                r: data.radar_values,
                theta:['名望', '外交', '忠诚', '跨界', '风险'],
                fill: 'toself',
                line: {color: '#00f2ff'}
            }];
            const radarLayout = {
                polar: { radialaxis: {visible: false}, bgcolor: 'rgba(0,0,0,0)' },
                paper_bgcolor: 'rgba(0,0,0,0)',
                margin: {t: 20, b: 20, l: 30, r: 30},
                showlegend: false
            };
            Plotly.newPlot('radar-chart', radarData, radarLayout, {displayModeBar: false});

            // --- 修复关系网疯狂抖动的问题 ---
            const container = document.getElementById('network-graph');
            const graphData = { nodes: data.net_nodes, edges: data.net_edges };
            
            const options = {
                nodes: { 
                    shape: 'dot', 
                    font: {color: '#ffffff', size: 14, strokeWidth: 2, strokeColor: '#000000'} // 增加文字描边，更清晰
                },
                edges: { width: 1.5, color: 'rgba(51, 65, 85, 0.8)', smooth: {type: 'continuous'} },
                physics: { 
                    barnesHut: { 
                        gravitationalConstant: -2000, 
                        centralGravity: 0.1, 
                        springLength: 150, 
                        damping: 0.4 // 【关键参数】阻尼调到0.4，就像在水里一样，瞬间平稳
                    },
                    stabilization: { iterations: 100 } // 提前在后台计算100次位置
                }
            };
            
            if(network) network.destroy(); // 清除旧图
            network = new vis.Network(container, graphData, options);

            // 【终极锁定】动画平稳后彻底关闭物理引擎，绝对静止
            network.on("stabilizationIterationsDone", function () {
                network.setOptions( { physics: false } );
            });
        }

        // 页面加载完毕后，自动渲染第一个英雄
        window.onload = function() {
            if(Object.keys(shieldData).length > 0) {
                loadHeroData();
            }
        };

        // --- 闪电特效代码 (保持原样) ---
        const canvas = document.getElementById('canvas-lightning');
        const ctx = canvas.getContext('2d');
        let width, height;
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let mouse = { x: -1000, y: -1000 };
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; for(let i=0; i<2; i++) { particles.push(new Particle(e.clientX, e.clientY)); } });
        let particles =[];
        class Particle {
            constructor(x, y) { this.x = x; this.y = y; this.size = Math.random() * 1.5 + 0.5; this.speedX = Math.random() * 2 - 1; this.speedY = Math.random() * 2 - 1; this.color = '#00f2ff'; this.life = 60; }
            update() { this.x += this.speedX; this.y += this.speedY; this.life -= 2; }
            draw() { ctx.strokeStyle = this.color; ctx.lineWidth = this.size; ctx.shadowBlur = 5; ctx.shadowColor = this.color; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x + Math.random()*8-4, this.y + Math.random()*8-4); ctx.stroke(); }
        }
        function animate() { ctx.clearRect(0, 0, width, height); for(let i=0; i<particles.length; i++) { particles[i].update(); particles[i].draw(); if(particles[i].life <= 0) { particles.splice(i, 1); i--; } } requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
